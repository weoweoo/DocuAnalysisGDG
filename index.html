<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arxiv.ai Notebook</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>

    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const fileToBase64 = (file) => {
          return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result.split(',')[1]);
            reader.onerror = (error) => reject(error);
          });
        };

        const generateId = () => (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(7));

        // Simplified markdown parser
        const renderSimpleMarkdown = (text) => {
          let safeText = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
          
          let html = safeText
            .replace(/\*\*(.*?)\*\*/g, '<strong class="font-semibold text-gray-900 dark:text-gray-100">$1</strong>')
            .replace(/\*(.*?)\*/g, '<em class="italic">$1</em>')
            .replace(new RegExp('\`\`\`([\\s\\S]*?)\`\`\`', 'g'), '<pre class="bg-gray-100 dark:bg-gray-800 p-3 rounded-md my-2 overflow-x-auto font-mono text-sm border border-gray-200 dark:border-gray-700">$1</pre>')
            .replace(/`([^`]+)`/g, '<code class="bg-gray-100 dark:bg-gray-800 px-1.5 py-0.5 rounded text-sm font-mono">$1</code>')
            .replace(/\n\n/g, '<br/><br/>')
            .replace(/\n/g, '<br/>');

          return <div dangerouslySetInnerHTML={{ __html: html }} className="leading-relaxed" />;
        };

        function App() {
          const [apiKey, setApiKey] = useState('');
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [files, setFiles] = useState([]);
          const [activeFileId, setActiveFileId] = useState('default');
          
          const [chats, setChats] = useState({
            'default': [
              { role: 'model', text: "Hello! I am **arxivLLM**. I excel at explaining research papers in layman's terms.\n\nYou can upload a PDF to have me analyze it, or just ask me a general question here!" }
            ]
          });
          const [currentInput, setCurrentInput] = useState('');
          const [isGenerating, setIsGenerating] = useState(false);

          const messagesEndRef = useRef(null);
          const fileInputRef = useRef(null);

          useEffect(() => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
          }, [chats, activeFileId]);

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDarkMode]);

          const handleFileUpload = async (event) => {
            const uploadedFiles = Array.from(event.target.files);
            if (!uploadedFiles.length) return;

            const newFiles = [];
            for (const file of uploadedFiles) {
              if (file.type !== 'application/pdf') {
                alert(`File ${file.name} skipped: Only PDF formats are accepted.`);
                continue;
              }
              
              const base64 = await fileToBase64(file);
              const newFile = {
                id: generateId(),
                name: file.name,
                size: (file.size / 1024 / 1024).toFixed(2) + ' MB',
                url: URL.createObjectURL(file),
                base64: base64
              };
              newFiles.push(newFile);
            }

            if (newFiles.length > 0) {
              setFiles(prev => [...prev, ...newFiles]);
              setActiveFileId(newFiles[0].id);

              newFiles.forEach(f => {
                 setChats(prev => ({
                  ...prev,
                  [f.id]: [
                    { role: 'model', text: `Initialization complete for **${f.name}**.\n\nI am **arxivLLM**. Feel free to ask me to summarize this paper in layman's terms, or query specific details from it.` }
                  ]
                }));
              });
            }
            
            if (fileInputRef.current) fileInputRef.current.value = '';
          };

          const handleSendMessage = async () => {
            if (!currentInput.trim()) return;
            if (!apiKey) {
              alert("API Key required. Please input your Gemini API Key in the top header.");
              return;
            }

            const userMessage = currentInput.trim();
            setCurrentInput('');
            const activeFile = files.find(f => f.id === activeFileId); // undefined if 'default'
            
            const newMessages = [
              ...(chats[activeFileId] || []),
              { role: 'user', text: userMessage }
            ];
            
            setChats(prev => ({ ...prev, [activeFileId]: newMessages }));
            setIsGenerating(true);

            try {
              const contents = newMessages.map((msg, index) => {
                const parts = [];
                // Only attach the PDF if a file is active
                if (index === 1 && msg.role === 'user' && activeFile && activeFile.base64) {
                   parts.push({
                     inlineData: { mimeType: "application/pdf", data: activeFile.base64 }
                   });
                }
                parts.push({ text: msg.text });
                
                return {
                  role: msg.role === 'model' ? 'model' : 'user',
                  parts: parts
                };
              });

              // Skip the first welcome message
              const apiContents = contents.slice(1);

              const payload = {
                systemInstruction: {
                  parts: [{ 
                    text: "You are 'arxivLLM', an advanced AI assistant who excels at explaining complex research papers in layman's terms. If the user asks about the provided document, analyze it rigorously and cite exact references (e.g., page numbers, sections). If the user asks a generic question or something unrelated to the document, seamlessly transition to general knowledge to answer them helpfully. Always be clear, accessible, and objective." 
                  }]
                },
                contents: apiContents
              };

              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "API Connection Failed.");
              }

              const data = await response.json();
              const modelReply = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";

              setChats(prev => ({
                ...prev,
                [activeFileId]: [...newMessages, { role: 'model', text: modelReply }]
              }));

            } catch (error) {
              console.error("Error:", error);
              setChats(prev => ({
                ...prev,
                [activeFileId]: [...newMessages, { role: 'model', text: `**System Error:** ${error.message}` }]
              }));
            } finally {
              setIsGenerating(false);
            }
          };

          const activeFile = files.find(f => f.id === activeFileId);
          const activeChat = chats[activeFileId] || [];
          const isApiConnected = apiKey.trim().length > 15;

          return (
            <div className={`h-screen flex flex-col font-sans transition-colors duration-200 ${isDarkMode ? 'bg-slate-900 text-slate-200' : 'bg-slate-50 text-slate-800'}`}>
              
              {/* Header */}
              <header className={`flex items-center justify-between px-6 py-3 border-b shadow-sm z-10 ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-white border-slate-200'}`}>
                <div className="flex items-baseline space-x-3">
                  <h1 className="text-2xl font-serif font-bold text-[#b31b1b] tracking-tight">arxiv<span className={`text-lg font-sans font-medium ml-1 ${isDarkMode ? 'text-slate-400' : 'text-slate-600'}`}>LLM</span></h1>
                  <span className={`text-sm hidden sm:inline-block ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>Document Analysis</span>
                </div>

                <div className="flex items-center space-x-6 text-sm">
                  <div className="flex items-center space-x-3">
                    <div className={`flex items-center px-3 py-1.5 rounded-md border focus-within:ring-2 focus-within:ring-[#b31b1b]/20 transition-all ${isDarkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-300'}`}>
                      <input 
                        type="password" 
                        placeholder="Gemini API Key" 
                        value={apiKey}
                        onChange={(e) => setApiKey(e.target.value)}
                        className={`bg-transparent border-none outline-none text-sm w-48 ${isDarkMode ? 'text-white placeholder-slate-500' : 'text-slate-900 placeholder-slate-400'}`}
                      />
                      <div title={isApiConnected ? "API Key format recognized" : "Awaiting valid API Key"} className="relative flex h-2.5 w-2.5 ml-2">
                        {isApiConnected && <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>}
                        <span className={`relative inline-flex rounded-full h-2.5 w-2.5 ${isApiConnected ? 'bg-emerald-500' : 'bg-slate-300 dark:bg-slate-600'}`}></span>
                      </div>
                    </div>
                  </div>

                  <button 
                    onClick={() => setIsDarkMode(!isDarkMode)}
                    className={`px-3 py-1.5 rounded-md font-medium transition-colors ${isDarkMode ? 'bg-slate-800 hover:bg-slate-700 text-slate-200' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}
                  >
                    {isDarkMode ? 'Light Mode' : 'Dark Mode'}
                  </button>
                </div>
              </header>

              {/* Main Workspace */}
              <main className="flex-1 flex overflow-hidden">
                
                {/* Left Sidebar */}
                <div className={`w-64 flex flex-col border-r z-0 ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                  <div className="p-4">
                    <input 
                      type="file" 
                      accept="application/pdf" 
                      multiple 
                      className="hidden" 
                      ref={fileInputRef}
                      onChange={handleFileUpload}
                    />
                    <button 
                      onClick={() => fileInputRef.current?.click()}
                      className={`w-full py-2 px-4 rounded-md font-medium shadow-sm transition-all text-sm flex justify-center items-center ${isDarkMode ? 'bg-[#b31b1b] hover:bg-[#8a1515] text-white' : 'bg-[#b31b1b] hover:bg-[#9d1720] text-white'}`}
                    >
                      Upload Document
                    </button>
                  </div>

                  <div className="flex-1 overflow-y-auto px-3 pb-4">
                    <h2 className={`text-xs font-bold uppercase tracking-wider mb-3 px-1 ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>Sessions</h2>
                    
                    <ul className="space-y-1">
                      <li>
                        <button
                          onClick={() => setActiveFileId('default')}
                          className={`w-full text-left px-3 py-2.5 rounded-md text-sm transition-colors flex flex-col ${
                            activeFileId === 'default' 
                              ? (isDarkMode ? 'bg-slate-800 text-[#ff8a8a] shadow-sm' : 'bg-white text-[#b31b1b] shadow-sm border border-slate-200')
                              : (isDarkMode ? 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200' : 'text-slate-600 hover:bg-slate-200/50 hover:text-slate-900')
                          }`}
                        >
                          <span className="font-medium truncate w-full">General Chat</span>
                          <span className={`text-xs mt-0.5 ${activeFileId === 'default' ? 'opacity-80' : 'opacity-60'}`}>No document selected</span>
                        </button>
                      </li>
                      
                      {files.map((file) => (
                        <li key={file.id}>
                          <button
                            onClick={() => setActiveFileId(file.id)}
                            className={`w-full text-left px-3 py-2.5 rounded-md text-sm transition-colors flex flex-col ${
                              activeFileId === file.id 
                                ? (isDarkMode ? 'bg-slate-800 text-[#ff8a8a] shadow-sm' : 'bg-white text-[#b31b1b] shadow-sm border border-slate-200')
                                : (isDarkMode ? 'text-slate-400 hover:bg-slate-800/50 hover:text-slate-200' : 'text-slate-600 hover:bg-slate-200/50 hover:text-slate-900')
                            }`}
                          >
                            <span className="font-medium truncate w-full">{file.name}</span>
                            <span className={`text-xs mt-0.5 ${activeFileId === file.id ? 'opacity-80' : 'opacity-60'}`}>{file.size}</span>
                          </button>
                        </li>
                      ))}
                    </ul>
                  </div>
                </div>

                {/* Center Panel: PDF Viewer */}
                <div className={`flex-1 flex flex-col ${isDarkMode ? 'bg-slate-950' : 'bg-slate-200'}`}>
                  {activeFile ? (
                    <object 
                      data={activeFile.url} 
                      type="application/pdf" 
                      className="w-full h-full"
                    >
                       <div className="flex h-full items-center justify-center p-8 text-center flex-col">
                          <p className="mb-4">Your browser is blocking the inline PDF preview.</p>
                          <a href={activeFile.url} download={activeFile.name} className="px-4 py-2 bg-[#b31b1b] text-white rounded-md">
                            Download PDF instead
                          </a>
                       </div>
                    </object>
                  ) : (
                    <div className="flex-1 flex flex-col items-center justify-center">
                      <div className={`w-20 h-20 rounded-md border-2 border-dashed mb-4 flex items-center justify-center ${isDarkMode ? 'border-slate-700 text-slate-700' : 'border-slate-400 text-slate-400'}`}>
                         <span className="font-serif text-3xl">AI</span>
                      </div>
                      <span className={`text-sm font-medium ${isDarkMode ? 'text-slate-500' : 'text-slate-500'}`}>
                        General Chat Active
                      </span>
                      <p className={`text-xs mt-2 ${isDarkMode ? 'text-slate-600' : 'text-slate-400'}`}>Select a document from the left to view it here.</p>
                    </div>
                  )}
                </div>

                {/* Right Sidebar: Chat */}
                <div className={`w-96 flex flex-col border-l shadow-sm z-0 ${isDarkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                  
                  <div className={`px-5 py-3 border-b flex items-center ${isDarkMode ? 'border-slate-800' : 'border-slate-100'}`}>
                     <h2 className="text-sm font-semibold tracking-wide">arxivLLM</h2>
                  </div>

                  <div className="flex-1 overflow-y-auto p-5 space-y-6">
                    {activeChat.map((msg, idx) => (
                      <div key={idx} className={`flex flex-col ${msg.role === 'user' ? 'items-end' : 'items-start'}`}>
                        <span className={`text-[11px] font-bold uppercase tracking-wider mb-1.5 ${msg.role === 'user' ? 'text-slate-400' : 'text-[#b31b1b]'}`}>
                          {msg.role === 'user' ? 'Researcher' : 'arxivLLM'}
                        </span>
                        <div className={`max-w-[90%] p-3.5 rounded-xl text-sm shadow-sm ${
                          msg.role === 'user' 
                            ? (isDarkMode ? 'bg-slate-800 text-slate-200 rounded-tr-sm' : 'bg-slate-100 text-slate-800 rounded-tr-sm')
                            : (isDarkMode ? 'bg-slate-800/50 border border-slate-700/50 text-slate-300 rounded-tl-sm font-serif' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-sm font-serif')
                        }`}>
                          {msg.role === 'model' ? (
                            renderSimpleMarkdown(msg.text)
                          ) : (
                            <p className="whitespace-pre-wrap">{msg.text}</p>
                          )}
                        </div>
                      </div>
                    ))}
                    
                    {isGenerating && (
                      <div className="flex flex-col items-start">
                         <span className="text-[11px] font-bold uppercase tracking-wider mb-1.5 text-[#b31b1b]">arxivLLM</span>
                         <div className={`px-4 py-3 rounded-xl rounded-tl-sm text-sm border flex items-center space-x-2 ${isDarkMode ? 'bg-slate-800/50 border-slate-700/50 text-slate-400' : 'bg-white border-slate-200 text-slate-500'}`}>
                           <span className="w-1.5 h-1.5 rounded-full bg-[#b31b1b] animate-bounce" style={{ animationDelay: '0ms' }}></span>
                           <span className="w-1.5 h-1.5 rounded-full bg-[#b31b1b] animate-bounce" style={{ animationDelay: '150ms' }}></span>
                           <span className="w-1.5 h-1.5 rounded-full bg-[#b31b1b] animate-bounce" style={{ animationDelay: '300ms' }}></span>
                           <span className="ml-2 font-serif italic text-xs">Formulating response...</span>
                         </div>
                      </div>
                    )}
                    <div ref={messagesEndRef} />
                  </div>

                  <div className={`p-4 border-t ${isDarkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-50 border-slate-200'}`}>
                    <div className={`relative rounded-xl border bg-white shadow-sm focus-within:ring-2 focus-within:ring-[#b31b1b]/20 transition-all ${isDarkMode ? 'bg-slate-900 border-slate-700' : 'bg-white border-slate-300'}`}>
                      <textarea
                        value={currentInput}
                        onChange={(e) => setCurrentInput(e.target.value)}
                        onKeyDown={(e) => {
                          if (e.key === 'Enter' && !e.shiftKey) {
                            e.preventDefault();
                            handleSendMessage();
                          }
                        }}
                        placeholder={activeFile ? "Ask a question about the document..." : "Ask a general question..."}
                        disabled={isGenerating}
                        className="w-full p-3 pr-12 resize-none text-sm bg-transparent outline-none disabled:opacity-50"
                        rows={2}
                      />
                      <button
                        onClick={handleSendMessage}
                        disabled={!currentInput.trim() || isGenerating}
                        className={`absolute right-2 bottom-2 p-1.5 rounded-lg transition-colors disabled:opacity-50 ${isDarkMode ? 'bg-slate-800 hover:bg-slate-700 text-white' : 'bg-slate-100 hover:bg-slate-200 text-slate-700'}`}
                      >
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                          <line x1="22" y1="2" x2="11" y2="13"></line>
                          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                      </button>
                    </div>
                    <div className={`text-[10px] text-center mt-2 ${isDarkMode ? 'text-slate-500' : 'text-slate-400'}`}>
                      Press Enter to send, Shift + Enter for new line.
                    </div>
                  </div>

                </div>

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
